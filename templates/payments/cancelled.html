{% extends 'store/base_store.html' %}

{% block title %}Pago Cancelado - Ross Crafts{% endblock %}

{% block content %}
<div class="min-h-screen bg-cream flex items-center justify-center py-16 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-lg border border-gray-100 p-8 sm:p-10 text-center">

        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-times text-3xl text-red-500"></i>
        </div>

        <h1 class="text-2xl font-bold text-primary mb-2">Pago Cancelado</h1>
        <p class="text-gray-500 mb-6">Tu pago no fue procesado. Puedes intentarlo nuevamente o volver al carrito.</p>

        <div class="flex flex-col sm:flex-row gap-3">
            <a href="{% url 'payments:checkout' %}"
               class="flex-1 inline-flex items-center justify-center gap-2 bg-primary hover:bg-primary-dark text-white font-bold py-3 px-6 rounded-xl transition">
                <i class="fas fa-redo"></i> Intentar de nuevo
            </a>
            <a href="{% url 'ecommerce:cart' %}"
               class="flex-1 inline-flex items-center justify-center gap-2 bg-white border-2 border-gray-200 text-gray-600 hover:border-primary hover:text-primary font-bold py-3 px-6 rounded-xl transition">
                <i class="fas fa-shopping-cart"></i> Ver carrito
            </a>
        </div>
    </div>
</div>
{% endblock %}
